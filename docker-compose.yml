# Production compose for deepintel2.
#
# Assumes:
#   - Traefik already runs on this host with the external network name below.
#   - Traefik has a `websecure` entrypoint with a Let's Encrypt resolver.
#   - DNS for deepintel.boniforce.de points to the host IP.
#
# Adjust TRAEFIK_NETWORK / CERTRESOLVER below to match your stack.

services:
  deepintel:
    build:
      context: .
      dockerfile: Dockerfile
    image: deepintel2:0.2.8
    container_name: deepintel2
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - deepintel_data:/data
    networks:
      - traefik-public
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # Two backend services on this single container
      - "traefik.http.services.deepintel-ui.loadbalancer.server.port=8501"
      - "traefik.http.services.deepintel-api.loadbalancer.server.port=8000"
      # ── HTTPS router: API (/api*) — higher priority than UI
      - "traefik.http.routers.deepintel-api.rule=Host(`deepintel.boniforce.de`) && PathPrefix(`/api`)"
      - "traefik.http.routers.deepintel-api.entrypoints=websecure"
      - "traefik.http.routers.deepintel-api.tls=true"
      - "traefik.http.routers.deepintel-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.deepintel-api.service=deepintel-api"
      - "traefik.http.routers.deepintel-api.priority=20"
      # ── HTTPS router: UI (everything else)
      - "traefik.http.routers.deepintel.rule=Host(`deepintel.boniforce.de`)"
      - "traefik.http.routers.deepintel.entrypoints=websecure"
      - "traefik.http.routers.deepintel.tls=true"
      - "traefik.http.routers.deepintel.tls.certresolver=letsencrypt"
      - "traefik.http.routers.deepintel.service=deepintel-ui"
      - "traefik.http.routers.deepintel.priority=10"
      - "traefik.http.middlewares.deepintel-headers.headers.customRequestHeaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.deepintel.middlewares=deepintel-headers"
      # ── HTTP → HTTPS redirect (both routers)
      - "traefik.http.routers.deepintel-http.rule=Host(`deepintel.boniforce.de`)"
      - "traefik.http.routers.deepintel-http.entrypoints=web"
      - "traefik.http.routers.deepintel-http.middlewares=deepintel-redirect"
      - "traefik.http.middlewares.deepintel-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.deepintel-redirect.redirectscheme.permanent=true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  deepintel_data:

networks:
  traefik-public:
    external: true
